name: photomailer
description: "ФотоПочта — удобное приложение для пакетной отправки фотографий по электронной почте."
publish_to: "none"

version: 1.1.0+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4
  flutter_web_auth_2: ^5.0.1
  http: ^1.5.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  local_auth: ^2.3.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  adaptive_icon_foreground: assets/icons/app_icon.png
  adaptive_icon_background: "#2CA8F4"
  remove_alpha_ios: true
